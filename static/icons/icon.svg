<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="96" fill="#4F46E5"/>
  <!-- Scissors icon -->
  <g transform="translate(256,256)" fill="none" stroke="#fff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left blade -->
    <circle cx="-68" cy="80" r="40" fill="none"/>
    <line x1="-40" y1="52" x2="80" y2="-100"/>
    <!-- Right blade -->
    <circle cx="68" cy="80" r="40" fill="none"/>
    <line x1="40" y1="52" x2="-80" y2="-100"/>
    <!-- Center crossing detail -->
    <line x1="-8" y1="-20" x2="8" y2="-20" stroke-width="16"/>
  </g>
  <!-- "IDB" text -->
  <text x="256" y="440" text-anchor="middle" fill="rgba(255,255,255,0.85)"
        font-family="Inter,system-ui,sans-serif" font-weight="700" font-size="56"
        letter-spacing="8">IDB</text>
</svg>
