<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – {{ boutique_name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { inter: ['Inter', 'sans-serif'] },
          colors: {
            brand: { 50:'#fdf4ff', 100:'#fae8ff', 200:'#f5d0fe', 300:'#f0abfc', 400:'#e879f9', 500:'#d946ef', 600:'#c026d3', 700:'#a21caf', 800:'#86198f', 900:'#701a75' },
            gold:  { 400:'#facc15', 500:'#eab308', 600:'#ca8a04' }
          },
          animation: { 'fade-in': 'fadeIn .4s ease-out', 'slide-up': 'slideUp .4s ease-out' },
          keyframes: { fadeIn: { from:{ opacity:0 }, to:{ opacity:1 } }, slideUp: { from:{ opacity:0, transform:'translateY(16px)' }, to:{ opacity:1, transform:'translateY(0)' } } }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .pin-digit { letter-spacing: .5em; font-size: 2rem; }
    .btn-primary {
      background: linear-gradient(135deg, #c026d3, #7c3aed);
      transition: all .2s;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(192,38,211,.4); }
    .btn-primary:active { transform: translateY(0); }
    .glass { backdrop-filter: blur(20px); background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 flex items-center justify-center p-4">

  <!-- Background decoration -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-purple-500 rounded-full opacity-10 blur-3xl"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-pink-500 rounded-full opacity-10 blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-md animate-slide-up">
    <!-- Logo & Title -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-brand-500 to-purple-600 shadow-2xl mb-4">
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 13.5l7-7a4.95 4.95 0 017 7l-7 7-7-7z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 9l1.5 1.5"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">{{ boutique_name }}</h1>
      <p class="text-purple-300 mt-1 text-sm">Staff Management Portal</p>
    </div>

    <!-- Login Card -->
    <div class="glass rounded-2xl p-8 shadow-2xl">
      <h2 class="text-xl font-semibold text-white mb-6 text-center">Welcome Back</h2>

      <!-- Error Alert -->
      <div id="alert" class="hidden mb-4 px-4 py-3 rounded-xl text-sm font-medium"></div>

      <form id="loginForm" novalidate>
        <!-- Phone Number -->
        <div class="mb-5">
          <label class="block text-purple-200 text-sm font-medium mb-2">Mobile Number</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-purple-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
              </svg>
            </span>
            <input
              id="phone"
              type="tel"
              inputmode="numeric"
              maxlength="10"
              placeholder="10-digit mobile number"
              class="w-full bg-white/10 border border-white/20 text-white placeholder-white/40 rounded-xl pl-10 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent transition"
              autocomplete="tel"
            />
          </div>
        </div>

        <!-- PIN -->
        <div class="mb-6">
          <label class="block text-purple-200 text-sm font-medium mb-2">4-Digit PIN</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-purple-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
            </span>
            <input
              id="pin"
              type="password"
              inputmode="numeric"
              maxlength="4"
              placeholder="••••"
              class="w-full bg-white/10 border border-white/20 text-white placeholder-white/40 rounded-xl pl-10 pr-12 py-3 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent transition tracking-widest text-xl"
              autocomplete="current-password"
            />
            <button type="button" id="togglePin" class="absolute right-3 top-1/2 -translate-y-1/2 text-purple-400 hover:text-white transition">
              <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          id="loginBtn"
          class="btn-primary w-full text-white font-semibold py-3.5 rounded-xl text-base"
        >
          <span id="btnText">Sign In</span>
          <span id="btnLoader" class="hidden">
            <svg class="inline w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
            Signing in...
          </span>
        </button>
      </form>
    </div>

    <p class="text-center text-white/30 text-xs mt-6">
      {{ boutique_name }} · Secure Portal · IST
    </p>
  </div>

  <script>
    // Toggle PIN visibility
    document.getElementById('togglePin').addEventListener('click', function() {
      const input = document.getElementById('pin');
      input.type = input.type === 'password' ? 'text' : 'password';
    });

    // Only allow digits in phone and pin
    ['phone', 'pin'].forEach(id => {
      document.getElementById(id).addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '');
      });
    });

    function showAlert(msg, type='error') {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = type === 'error'
        ? 'mb-4 px-4 py-3 rounded-xl text-sm font-medium bg-red-500/20 border border-red-500/40 text-red-300'
        : 'mb-4 px-4 py-3 rounded-xl text-sm font-medium bg-green-500/20 border border-green-500/40 text-green-300';
      el.classList.remove('hidden');
    }

    function setLoading(loading) {
      const btn = document.getElementById('loginBtn');
      btn.disabled = loading;
      document.getElementById('btnText').classList.toggle('hidden', loading);
      document.getElementById('btnLoader').classList.toggle('hidden', !loading);
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const phone = document.getElementById('phone').value.trim();
      const pin = document.getElementById('pin').value.trim();

      document.getElementById('alert').classList.add('hidden');

      if (phone.length !== 10) { showAlert('Please enter a valid 10-digit mobile number.'); return; }
      if (pin.length !== 4) { showAlert('Please enter your 4-digit PIN.'); return; }

      setLoading(true);
      try {
        const resp = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone_number: phone, pin }),
        });
        const data = await resp.json();

        if (data.success) {
          showAlert('Login successful! Redirecting…', 'success');
          setTimeout(() => { window.location.href = data.redirect_url; }, 500);
        } else {
          showAlert(data.error || 'Login failed. Please try again.');
        }
      } catch(err) {
        showAlert('Network error. Please check your connection.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
