{% extends "base.html" %}

{% block title %}Login - {{ boutique_name }}{% endblock %}

{% block content %}
<div class="flex min-h-full items-center justify-center px-4 py-8 bg-gray-100">

  <div class="relative w-full max-w-sm animate-slide-up" x-data="loginPage()" x-cloak>
    <div class="overflow-hidden rounded-lg bg-white border border-gray-200 shadow-lg" :class="{ 'animate-shake': shaking }">
      <div class="border-b border-gray-100 px-5 pb-4 pt-5 text-center">
        <h1 class="text-base font-bold tracking-tight text-gray-900">{{ boutique_name }}</h1>
        <p class="mt-0.5 text-xs text-gray-500">Staff Management Portal</p>
      </div>

      <form class="px-5 pb-5 pt-4" @submit.prevent="doLogin()">
        <label class="block text-xs font-medium text-gray-600 mb-1.5">Phone Number</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-xs font-semibold text-gray-400">+91</span>
          <input
            type="tel"
            inputmode="numeric"
            maxlength="10"
            x-model="phone"
            @input="phone = phone.replace(/\D/g, '').slice(0, 10)"
            placeholder="Enter 10-digit number"
            class="w-full rounded-lg bg-gray-50 py-2.5 pl-10 pr-3 text-sm font-semibold tracking-widest text-gray-800 placeholder:text-xs placeholder:font-normal placeholder:tracking-normal transition-all focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-200"
            autofocus
          >
        </div>

        <label class="block text-xs font-medium text-gray-600 mb-1.5 mt-4">PIN</label>
        <input
          type="password"
          inputmode="numeric"
          maxlength="4"
          x-model="pin"
          @input="pin = pin.replace(/\D/g, '').slice(0, 4); error = ''"
          placeholder="Enter 4-digit PIN"
          class="w-full rounded-lg bg-gray-50 py-2.5 px-3 text-sm font-semibold tracking-widest text-gray-800 placeholder:text-xs placeholder:font-normal placeholder:tracking-normal transition-all focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-200"
        >

        <p x-show="error" x-transition class="mt-3 text-center text-xs font-medium text-red-500" x-text="error"></p>

        <button
          type="submit"
          :disabled="phone.length !== 10 || pin.length !== 4 || submitting"
          class="mt-4 flex w-full items-center justify-center gap-1.5 rounded-lg py-2.5 text-xs font-semibold text-white shadow-sm transition-all active:scale-[0.98] disabled:cursor-not-allowed disabled:opacity-40 disabled:shadow-none"
          :class="submitting ? 'bg-brand-400' : 'bg-brand-600 shadow-brand-600/30 hover:bg-brand-700'"
        >
          <svg x-show="submitting" class="h-4 w-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span x-text="submitting ? 'Signing in...' : 'Login'"></span>
        </button>
      </form>
    </div>

    <!-- Footer -->
    <p class="mt-8 text-center text-xs text-gray-400">
      &copy; {{ now.year if now is defined else "2025" }} {{ boutique_name }}
    </p>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
  function loginPage() {
    return {
      phone: '',
      pin: '',
      error: '',
      submitting: false,
      shaking: false,

      async doLogin() {
        if (this.phone.length !== 10 || this.pin.length !== 4 || this.submitting) return;

        this.submitting = true;
        this.error = '';

        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              phone_number: this.phone,
              pin: this.pin,
            }),
          });

          const data = await res.json();

          if (res.ok) {
            const user = data.user || {};
            dispatchToast('success', 'Welcome back!', user.full_name || '');

            if (user.is_first_login) {
              window.location.href = '/change-pin';
            } else if (['admin', 'manager'].includes(user.role)) {
              window.location.href = '/admin/dashboard';
            } else {
              window.location.href = '/staff/duty';
            }
          } else {
            throw new Error(data.error || 'Invalid credentials');
          }
        } catch (err) {
          this.pin = '';
          this.error = err.message || 'Login failed. Please try again.';
          this.shaking = true;
          setTimeout(() => { this.shaking = false; }, 500);
          dispatchToast('error', 'Login Failed', this.error);
        } finally {
          this.submitting = false;
        }
      },
    };
  }
</script>
{% endblock %}
