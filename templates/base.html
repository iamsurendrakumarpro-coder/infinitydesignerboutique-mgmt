<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="IDB Manager">
  <meta name="description" content="Infinity Designer Boutique – Staff Management System">

  <title>{% block title %}Infinity Designer Boutique{% endblock %}</title>

  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon.svg">
  <link rel="icon" type="image/svg+xml" href="/static/icons/icon.svg">
  <!-- Tailwind CSS (pre-compiled) + custom styles -->
  <link rel="stylesheet" href="/static/css/tailwind.css">
  <link rel="stylesheet" href="/static/css/app.css">

  <!-- Alpine.js (local) -->
  <script defer src="/static/js/alpine.min.js"></script>

  <style>
    [x-cloak] { display: none !important; }
  </style>
</head>

<body class="h-full bg-gray-50 font-sans antialiased"
      x-data="appGlobal()"
      @toast.window="addToast($event.detail)">

  <!-- ── Loading Overlay ──────────────────────────────────────────────── -->
  <div x-show="loading" x-cloak x-transition.opacity
       class="fixed inset-0 z-[9999] flex items-center justify-center bg-brand-950/60 backdrop-blur-sm">
    <div class="flex flex-col items-center gap-4">
      <svg class="h-12 w-12 animate-spin text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <p class="text-sm font-medium text-white/90">Loading…</p>
    </div>
  </div>

  <!-- ── Toast Notifications ──────────────────────────────────────────── -->
  <div aria-live="assertive"
       class="pointer-events-none fixed inset-x-0 top-0 z-[9998] flex flex-col items-center gap-2 px-4 pt-4">
    <template x-for="toast in toasts" :key="toast.id">
      <div x-show="toast.visible"
           x-transition:enter="transition ease-out duration-300"
           x-transition:enter-start="opacity-0 -translate-y-4 scale-95"
           x-transition:enter-end="opacity-100 translate-y-0 scale-100"
           x-transition:leave="transition ease-in duration-200"
           x-transition:leave-start="opacity-100 translate-y-0 scale-100"
           x-transition:leave-end="opacity-0 -translate-y-4 scale-95"
           class="pointer-events-auto w-full max-w-sm overflow-hidden rounded-xl shadow-lg ring-1"
           :class="{
             'bg-green-50 ring-green-200': toast.type === 'success',
             'bg-red-50 ring-red-200':     toast.type === 'error',
             'bg-amber-50 ring-amber-200': toast.type === 'warning',
             'bg-blue-50 ring-blue-200':   toast.type === 'info',
           }">
        <div class="flex items-start gap-3 p-4">
          <!-- Icon -->
          <div class="shrink-0 pt-0.5">
            <template x-if="toast.type === 'success'">
              <svg class="h-5 w-5 text-green-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </template>
            <template x-if="toast.type === 'error'">
              <svg class="h-5 w-5 text-red-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>
              </svg>
            </template>
            <template x-if="toast.type === 'warning'">
              <svg class="h-5 w-5 text-amber-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
              </svg>
            </template>
            <template x-if="toast.type === 'info'">
              <svg class="h-5 w-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/>
              </svg>
            </template>
          </div>
          <!-- Text -->
          <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold"
               :class="{
                 'text-green-800': toast.type === 'success',
                 'text-red-800':   toast.type === 'error',
                 'text-amber-800': toast.type === 'warning',
                 'text-blue-800':  toast.type === 'info',
               }"
               x-text="toast.title"></p>
            <p x-show="toast.message" class="mt-0.5 text-sm"
               :class="{
                 'text-green-700': toast.type === 'success',
                 'text-red-700':   toast.type === 'error',
                 'text-amber-700': toast.type === 'warning',
                 'text-blue-700':  toast.type === 'info',
               }"
               x-text="toast.message"></p>
          </div>
          <!-- Close -->
          <button @click="removeToast(toast.id)"
                  class="shrink-0 rounded-md p-1 transition-colors hover:bg-black/5">
            <svg class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </div>
    </template>
  </div>

  <!-- ── Page Content ─────────────────────────────────────────────────── -->
  {% block content %}{% endblock %}

  <!-- ── Global Scripts ───────────────────────────────────────────────── -->
  <script>
    function appGlobal() {
      return {
        loading: false,
        toasts: [],
        _toastId: 0,

        showLoading() { this.loading = true; },
        hideLoading() { this.loading = false; },

        addToast({ title = '', message = '', type = 'info', duration = 4000 } = {}) {
          const id = ++this._toastId;
          const toast = { id, title, message, type, visible: true };
          this.toasts.push(toast);
          if (duration > 0) {
            setTimeout(() => this.removeToast(id), duration);
          }
        },

        removeToast(id) {
          const t = this.toasts.find(t => t.id === id);
          if (t) {
            t.visible = false;
            setTimeout(() => {
              this.toasts = this.toasts.filter(t => t.id !== id);
            }, 300);
          }
        },

        toast(type, title, message, duration) {
          this.addToast({ type, title, message, duration });
        },
      };
    }

    function dispatchToast(type, title, message, duration) {
      window.dispatchEvent(new CustomEvent('toast', {
        detail: { type, title, message, duration }
      }));
    }

    // Service Worker registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/static/sw.js').catch(() => {});
      });
    }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
