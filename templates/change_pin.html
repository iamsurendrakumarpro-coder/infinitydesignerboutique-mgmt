<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change PIN – {{ boutique_name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { inter:['Inter','sans-serif'] }, colors: { brand:{ 500:'#d946ef', 600:'#c026d3' } } } } }</script>
  <style>body{ font-family:'Inter',sans-serif; }</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-amber-500 shadow-2xl mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Set Your New PIN</h1>
      <p class="text-amber-300 mt-1 text-sm">
        {% if user.is_first_login %}First-time login – please set a private PIN before continuing.
        {% else %}Enter your current PIN and choose a new one.{% endif %}
      </p>
    </div>

    <div class="bg-white/10 backdrop-blur border border-white/20 rounded-2xl p-8 shadow-2xl">
      <div id="alert" class="hidden mb-4 px-4 py-3 rounded-xl text-sm font-medium"></div>

      <form id="pinForm" novalidate>
        {% if not user.is_first_login %}
        <div class="mb-4">
          <label class="block text-purple-200 text-sm font-medium mb-2">Current PIN</label>
          <input id="oldPin" type="password" inputmode="numeric" maxlength="4" placeholder="••••"
            class="w-full bg-white/10 border border-white/20 text-white placeholder-white/40 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-brand-500 tracking-widest text-xl text-center" />
        </div>
        {% endif %}

        <div class="mb-4">
          <label class="block text-purple-200 text-sm font-medium mb-2">New PIN</label>
          <input id="newPin" type="password" inputmode="numeric" maxlength="4" placeholder="••••"
            class="w-full bg-white/10 border border-white/20 text-white placeholder-white/40 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-brand-500 tracking-widest text-xl text-center" />
        </div>

        <div class="mb-6">
          <label class="block text-purple-200 text-sm font-medium mb-2">Confirm New PIN</label>
          <input id="confirmPin" type="password" inputmode="numeric" maxlength="4" placeholder="••••"
            class="w-full bg-white/10 border border-white/20 text-white placeholder-white/40 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-brand-500 tracking-widest text-xl text-center" />
        </div>

        <button type="submit" id="submitBtn"
          class="w-full bg-gradient-to-r from-brand-600 to-purple-600 hover:opacity-90 text-white font-semibold py-3.5 rounded-xl transition">
          <span id="btnText">Set New PIN</span>
          <span id="btnLoader" class="hidden">
            <svg class="inline w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
          </span>
        </button>
      </form>
    </div>
  </div>

  <script>
    ['oldPin','newPin','confirmPin'].forEach(id => {
      const el = document.getElementById(id);
      if(el) el.addEventListener('input', () => { el.value = el.value.replace(/\D/g,''); });
    });

    function showAlert(msg, type='error') {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = type === 'error'
        ? 'mb-4 px-4 py-3 rounded-xl text-sm font-medium bg-red-500/20 border border-red-500/40 text-red-300'
        : 'mb-4 px-4 py-3 rounded-xl text-sm font-medium bg-green-500/20 border border-green-500/40 text-green-300';
      el.classList.remove('hidden');
    }

    document.getElementById('pinForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const newPin = document.getElementById('newPin').value;
      const confirmPin = document.getElementById('confirmPin').value;
      const oldPinEl = document.getElementById('oldPin');
      const oldPin = oldPinEl ? oldPinEl.value : null;

      if(newPin.length !== 4) { showAlert('New PIN must be exactly 4 digits.'); return; }
      if(newPin !== confirmPin) { showAlert('PINs do not match. Please try again.'); return; }

      document.getElementById('btnText').classList.add('hidden');
      document.getElementById('btnLoader').classList.remove('hidden');
      document.getElementById('submitBtn').disabled = true;

      const body = { new_pin: newPin };
      if(oldPin) body.old_pin = oldPin;

      try {
        const resp = await fetch('/api/auth/change-pin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await resp.json();
        if(data.success) {
          showAlert('PIN updated! Redirecting…', 'success');
          setTimeout(() => { window.location.href = data.redirect_url; }, 1000);
        } else {
          showAlert(data.error || 'Failed to update PIN.');
          document.getElementById('btnText').classList.remove('hidden');
          document.getElementById('btnLoader').classList.add('hidden');
          document.getElementById('submitBtn').disabled = false;
        }
      } catch(err) {
        showAlert('Network error. Please try again.');
        document.getElementById('btnText').classList.remove('hidden');
        document.getElementById('btnLoader').classList.add('hidden');
        document.getElementById('submitBtn').disabled = false;
      }
    });
  </script>
</body>
</html>
