{% extends "admin/layout.html" %}

{% block page_title %}Staff Directory{% endblock %}

{% block page_content %}
<div x-data="staffDirectory()" x-init="loadStaff()" x-cloak>

  <div class="mb-3 flex items-start justify-between gap-3">
    <div>
      <h1 class="text-sm font-semibold text-gray-800">Staff Directory</h1>
      <p class="text-[11px] text-gray-400" x-text="'Showing ' + filteredStaff.length + ' of ' + staff.length + ' staff'"> </p>
    </div>
    <a href="/admin/staff/create"
       class="inline-flex items-center gap-1.5 rounded-md bg-brand-600 px-3 py-1.5 text-[11px] font-semibold text-white transition-colors hover:bg-brand-700">
      <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
      </svg>
      Add Staff
    </a>
  </div>

  <div class="mb-3 rounded-md bg-white p-2.5 ring-1 ring-gray-100">
    <div class="flex flex-col gap-2 md:flex-row md:items-center">
      <div class="relative flex-1">
        <svg class="pointer-events-none absolute top-1/2 h-3.5 w-3.5 -translate-y-1/2 text-gray-400" style="left: 0.82rem;" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
        </svg>
        <input type="text" x-model="search" placeholder="Search by name, phone, or role"
               class="h-9 w-full rounded-md border border-gray-200 bg-white pr-3 text-[12px] text-gray-700 placeholder:text-gray-400 focus:border-brand-300 focus:outline-none focus:ring-2 focus:ring-brand-500/20"
               style="padding-left: 2.45rem;">
      </div>

      <div class="flex rounded-md bg-gray-50 p-0.5 md:shrink-0">
        <template x-for="tab in ['all', 'active', 'inactive']" :key="tab">
          <button @click="statusFilter = tab"
                  class="rounded px-3 py-1.5 text-[10px] font-semibold capitalize transition-all"
                  :class="statusFilter === tab
                    ? 'bg-white text-gray-800 shadow-sm'
                    : 'text-gray-500 hover:text-gray-700'"
                  x-text="tab"></button>
        </template>
      </div>
    </div>
  </div>

  <div x-show="loading" class="py-14 text-center">
    <svg class="mx-auto h-7 w-7 animate-spin text-brand-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
    </svg>
    <p class="mt-2 text-xs text-gray-400">Loading staff...</p>
  </div>

  <div x-show="!loading && filteredStaff.length === 0" class="py-10 text-center">
    <p class="text-xs font-medium text-gray-500">No staff found</p>
    <p class="mt-1 text-[10px] text-gray-400" x-text="search ? 'Try a different search term' : 'Add your first staff member'"></p>
  </div>

  <div x-show="!loading && filteredStaff.length > 0" class="grid grid-cols-1 gap-2 md:grid-cols-2 xl:grid-cols-3">
    <template x-for="member in filteredStaff" :key="member.user_id || member.id">
      <article class="rounded-md bg-white p-3 ring-1 ring-gray-100 transition-all hover:ring-gray-200">
        <div class="mb-2 flex items-start justify-between gap-2">
          <div class="min-w-0">
            <p class="truncate text-xs font-semibold text-gray-800" x-text="member.full_name || '-'" ></p>
            <p class="truncate text-[10px] text-gray-500" x-text="formatDesignation(member.designation)" ></p>
          </div>
          <span class="inline-flex rounded-full px-2 py-0.5 text-[10px] font-semibold"
                :class="member.status === 'active' ? 'bg-green-50 text-green-700' : 'bg-gray-100 text-gray-600'"
                x-text="member.status === 'active' ? 'Active' : 'Inactive'"></span>
        </div>

        <div class="space-y-1.5 rounded-md bg-gray-50 p-2 text-[11px]">
          <div class="flex items-center justify-between gap-2">
            <span class="text-gray-500">Phone</span>
            <span class="font-medium text-gray-700" x-text="formatIndianPhone(member.phone_number)"></span>
          </div>
          <div class="flex items-center justify-between gap-2">
            <span class="text-gray-500">Joined</span>
            <span class="font-medium text-gray-700" x-text="member.joining_date || '-'" ></span>
          </div>
          <div class="flex items-center justify-between gap-2">
            <span class="text-gray-500">Salary</span>
            <span class="font-medium text-gray-700" x-text="salarySummary(member)"></span>
          </div>
          <div class="flex items-center justify-between gap-2">
            <span class="text-gray-500">Emergency</span>
            <span class="font-medium text-gray-700" x-text="member.emergency_contact ? formatIndianPhone(member.emergency_contact) : 'Not provided'"></span>
          </div>
        </div>

        <div class="mt-2 flex items-center justify-end gap-1.5">
          <a :href="'/admin/staff/' + (member.user_id || member.id) + '/edit'"
             class="rounded-md bg-brand-50 px-2.5 py-1 text-[10px] font-semibold text-brand-700 transition-colors hover:bg-brand-100">
            Edit
          </a>
          <button @click="confirmToggle(member)"
                  class="rounded-md px-2.5 py-1 text-[10px] font-semibold transition-colors"
                  :class="member.status === 'active'
                    ? 'bg-red-50 text-red-600 hover:bg-red-100'
                    : 'bg-green-50 text-green-600 hover:bg-green-100'"
                  x-text="member.status === 'active' ? 'Deactivate' : 'Activate'">
          </button>
        </div>
      </article>
    </template>
  </div>

  <!-- Confirmation Dialog -->
  <div x-show="confirmDialog.open" x-transition.opacity
       class="fixed inset-0 z-50 flex items-center justify-center p-4" style="background: rgba(0,0,0,0.35)">
    <div x-show="confirmDialog.open"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
         @click.away="confirmDialog.open = false"
         class="w-full max-w-xs rounded-lg bg-white p-4 shadow-xl">
      <div class="mb-2.5 text-center">
        <div class="mx-auto mb-1.5 flex h-8 w-8 items-center justify-center rounded-full"
             :class="confirmDialog.newStatus === 'active' ? 'bg-green-50' : 'bg-red-50'">
          <span x-html="confirmDialog.newStatus === 'active' ? renderIcon('play', 'h-3.5 w-3.5') : renderIcon('pause', 'h-3.5 w-3.5')"></span>
        </div>
        <h3 class="text-xs font-semibold text-gray-800" x-text="confirmDialog.newStatus === 'active' ? 'Activate Staff?' : 'Deactivate Staff?'"></h3>
        <p class="mt-1 text-[10px] text-gray-500">
          Are you sure you want to
          <span x-text="confirmDialog.newStatus === 'active' ? 'activate' : 'deactivate'"></span>
          <strong x-text="confirmDialog.name"></strong>?
        </p>
      </div>
      <div class="flex gap-1.5">
        <button @click="confirmDialog.open = false"
                class="flex-1 rounded-md border border-gray-200 py-1 text-[10px] font-medium text-gray-600 transition-colors hover:bg-gray-50">
          Cancel
        </button>
        <button @click="toggleStatus()"
                :disabled="confirmDialog.processing"
                class="flex-1 rounded-md py-1 text-[10px] font-semibold text-white transition-colors disabled:opacity-50"
                :class="confirmDialog.newStatus === 'active'
                  ? 'bg-green-600 hover:bg-green-700'
                  : 'bg-red-600 hover:bg-red-700'"
                x-text="confirmDialog.processing ? 'Processing...' : 'Confirm'">
        </button>
      </div>
    </div>
  </div>

</div>
{% endblock %}

{% block page_scripts %}
<script>
  function staffDirectory() {
    return {
      loading: true,
      staff: [],
      search: '',
      statusFilter: 'all',
      confirmDialog: { open: false, member: null, name: '', newStatus: '', processing: false },

      get filteredStaff() {
        let list = [...this.staff];
        if (this.statusFilter !== 'all') {
          list = list.filter(s => s.status === this.statusFilter);
        }
        if (this.search.trim()) {
          const q = this.search.toLowerCase();
          list = list.filter(s =>
            (s.full_name || '').toLowerCase().includes(q) ||
            (s.phone_number || '').includes(q) ||
            (s.designation || '').toLowerCase().includes(q)
          );
        }
        return list.sort((a, b) => (a.full_name || '').localeCompare(b.full_name || ''));
      },

      async loadStaff() {
        this.loading = true;
        try {
          const res = await fetch('/api/users/staff', { credentials: 'include' });
          if (res.ok) {
            const data = await res.json();
            this.staff = data.staff || data.data || data.users || [];
          } else {
            dispatchToast('error', 'Error', 'Failed to load staff directory');
          }
        } catch (e) {
          dispatchToast('error', 'Network Error', 'Could not reach the server');
        } finally {
          this.loading = false;
        }
      },

      formatDesignation(designation) {
        if (!designation) return 'Staff';
        return String(designation)
          .split('_')
          .map(w => w.charAt(0).toUpperCase() + w.slice(1))
          .join(' ');
      },

      salarySummary(member) {
        if ((member.salary_type || 'weekly') === 'monthly') {
          const value = Number(member.monthly_salary || 0);
          return value ? `₹${value.toLocaleString('en-IN')} / month` : '-';
        }
        const value = Number(member.weekly_salary || 0);
        return value ? `₹${value.toLocaleString('en-IN')} / week` : '-';
      },

      formatIndianPhone(phone) {
        const digits = String(phone || '').replace(/\D/g, '');
        if (!digits) return '-';
        if (digits.length === 10) return `+91 ${digits}`;
        if (digits.length === 12 && digits.startsWith('91')) return `+91 ${digits.slice(2)}`;
        return `+${digits}`;
      },

      confirmToggle(member) {
        this.confirmDialog = {
          open: true,
          member: member,
          name: member.full_name,
          newStatus: member.status === 'active' ? 'inactive' : 'active',
          processing: false,
        };
      },

      async toggleStatus() {
        const member = this.confirmDialog.member;
        if (!member) return;
        this.confirmDialog.processing = true;

        try {
          const id = member.user_id || member.id;
          const res = await fetch(`/api/users/staff/${id}/status`, {
            method: 'PATCH',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: this.confirmDialog.newStatus }),
          });

          if (res.ok) {
            member.status = this.confirmDialog.newStatus;
            dispatchToast('success', 'Status Updated', `${member.full_name} is now ${this.confirmDialog.newStatus}`);
            this.confirmDialog.open = false;
          } else {
            const err = await res.json().catch(() => ({}));
            dispatchToast('error', 'Error', err.error || 'Failed to update status');
          }
        } catch (e) {
          dispatchToast('error', 'Network Error', 'Could not reach the server');
        } finally {
          this.confirmDialog.processing = false;
        }
      },
    };
  }
</script>
{% endblock %}
