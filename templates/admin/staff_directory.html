{% extends "admin/layout.html" %}

{% block page_title %}Staff Directory{% endblock %}

{% block page_content %}
<div x-data="staffDirectory()" x-init="loadStaff()" x-cloak>

  <div class="mb-4 flex flex-wrap items-start justify-between gap-3">
    <div class="flex items-center gap-3">
      <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-violet-50 text-violet-600"
           x-html="renderIcon('users', 'h-5 w-5')"></div>
      <div>
        <h1 class="text-base font-semibold text-gray-900">Staff Directory</h1>
        <p class="text-xs text-gray-500 mt-0.5" x-text="'Showing ' + filteredStaff.length + ' of ' + staff.length + ' staff'"> </p>
      </div>
    </div>
    <a x-show="userRole === 'admin'" href="/admin/staff/create" aria-label="Add new staff member"
       class="group inline-flex shrink-0 items-center gap-2 rounded-xl border border-brand-700 bg-brand-600 px-2.5 py-2 text-xs font-semibold text-white shadow-sm transition-all hover:-translate-y-0.5 hover:bg-brand-700 hover:shadow-md sm:px-3.5">
      <span class="flex h-6 w-6 shrink-0 items-center justify-center rounded-lg bg-brand-700 text-white"
            x-html="renderIcon('user-plus', 'h-3.5 w-3.5')"></span>
      <span class="hidden sm:inline">Add Staff</span>
      <span class="sm:hidden">Add</span>
    </a>
  </div>

  <div class="mb-4 rounded-lg bg-white border border-gray-200 p-3">
    <div class="flex flex-col gap-2.5 md:flex-row md:items-center">
      <div class="relative flex-1">
        <svg class="pointer-events-none absolute top-1/2 h-4 w-4 -translate-y-1/2 text-gray-400" style="left: 0.75rem;" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
        </svg>
        <input type="text" x-model="search" placeholder="Search by name, phone, or role"
               class="h-10 w-full rounded-lg border border-gray-300 bg-white pr-3 text-sm text-gray-700 placeholder:text-gray-400 focus:border-brand-400 focus:outline-none focus:ring-2 focus:ring-brand-500/20"
               style="padding-left: 2.5rem;">
      </div>

      <div class="flex rounded-lg bg-gray-100 p-0.5 md:shrink-0">
        <template x-for="tab in ['all', 'active', 'inactive']" :key="tab">
          <button @click="statusFilter = tab"
                  class="rounded-md px-3 py-1.5 text-xs font-medium capitalize transition-colors"
                  :class="statusFilter === tab
                    ? 'bg-white text-gray-900 shadow-sm'
                    : 'text-gray-500 hover:text-gray-700'"
                  x-text="tab"></button>
        </template>
      </div>
    </div>
  </div>

  <div x-show="loading" class="py-16 text-center">
    <svg class="mx-auto h-8 w-8 animate-spin text-brand-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
    </svg>
    <p class="mt-2 text-sm text-gray-500">Loading staff...</p>
  </div>

  <div x-show="!loading && filteredStaff.length === 0" class="py-12 text-center">
    <p class="text-sm font-medium text-gray-600">No staff found</p>
    <p class="mt-1 text-xs text-gray-500" x-text="search ? 'Try a different search term' : 'Add your first staff member'"></p>
  </div>

  <div x-show="!loading && filteredStaff.length > 0" class="space-y-3 md:grid md:grid-cols-2 md:gap-3 md:space-y-0 xl:grid-cols-3">
    <template x-for="member in filteredStaff" :key="member.user_id || member.id">
      <article class="rounded-lg bg-white border border-gray-200 p-4">
        <div class="mb-3 flex items-start justify-between gap-2">
          <div class="flex items-center gap-3 min-w-0">
            <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-brand-50 text-brand-600 font-semibold text-sm"
                 x-text="(member.full_name || '-').charAt(0).toUpperCase()"></div>
            <div class="min-w-0">
              <p class="truncate text-sm font-semibold text-gray-900" x-text="member.full_name || '-'" ></p>
              <p class="truncate text-xs text-gray-500" x-text="formatDesignation(member.designation)" ></p>
            </div>
          </div>
          <span class="inline-flex rounded-full px-2.5 py-0.5 text-xs font-medium"
                :class="member.status === 'active' ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-gray-50 text-gray-600 border border-gray-200'"
                x-text="member.status === 'active' ? 'Active' : 'Inactive'"></span>
        </div>

        <div class="space-y-2 border-t border-gray-100 pt-3 text-sm">
          <div class="flex items-center justify-between">
            <span class="text-gray-500">Phone</span>
            <span class="font-medium text-gray-900" x-text="formatIndianPhone(member.phone_number)"></span>
          </div>
          <div class="flex items-center justify-between">
            <span class="text-gray-500">Joined</span>
            <span class="font-medium text-gray-900" x-text="member.joining_date || '-'" ></span>
          </div>
          <div x-show="userRole === 'admin'" class="flex items-center justify-between">
            <span class="text-gray-500">Salary</span>
            <span class="font-medium text-gray-900" x-text="salarySummary(member)"></span>
          </div>
          <div class="flex items-center justify-between">
            <span class="text-gray-500">Emergency</span>
            <span class="font-medium text-gray-900" x-text="member.emergency_contact ? formatIndianPhone(member.emergency_contact) : 'Not provided'"></span>
          </div>
        </div>

        <div class="mt-3 flex items-center justify-end gap-2 border-t border-gray-100 pt-3">
          <a :href="'/admin/staff/' + (member.user_id || member.id) + '/edit'"
             class="rounded-lg border border-gray-300 bg-white px-3 py-1.5 text-xs font-medium text-gray-700 hover:bg-gray-50">
            Edit
          </a>
          <button @click="confirmToggle(member)"
                  class="rounded-lg px-3 py-1.5 text-xs font-medium"
                  :class="member.status === 'active'
                    ? 'border border-red-200 bg-red-50 text-red-600 hover:bg-red-100'
                    : 'border border-green-200 bg-green-50 text-green-600 hover:bg-green-100'"
                  x-text="member.status === 'active' ? 'Deactivate' : 'Activate'">
          </button>
        </div>
      </article>
    </template>
  </div>

  <!-- Confirmation Dialog -->
  <div x-show="confirmDialog.open" x-transition.opacity
       class="fixed inset-0 z-50 flex items-center justify-center p-4" style="background: rgba(0,0,0,0.4)">
    <div x-show="confirmDialog.open"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
         @click.away="confirmDialog.open = false"
         class="w-full max-w-sm rounded-lg bg-white p-5 shadow-xl border border-gray-200">
      <div class="mb-4 text-center">
        <h3 class="text-sm font-semibold text-gray-900" x-text="confirmDialog.newStatus === 'active' ? 'Activate Staff?' : 'Deactivate Staff?'"></h3>
        <p class="mt-2 text-sm text-gray-600">
          Are you sure you want to
          <span x-text="confirmDialog.newStatus === 'active' ? 'activate' : 'deactivate'"></span>
          <strong x-text="confirmDialog.name"></strong>?
        </p>
      </div>
      <div class="flex gap-2">
        <button @click="confirmDialog.open = false"
                class="flex-1 rounded-lg border border-gray-300 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">
          Cancel
        </button>
        <button @click="toggleStatus()"
                :disabled="confirmDialog.processing"
                class="flex-1 rounded-lg py-2 text-sm font-semibold text-white disabled:opacity-50"
                :class="confirmDialog.newStatus === 'active'
                  ? 'bg-green-600 hover:bg-green-700'
                  : 'bg-red-600 hover:bg-red-700'"
                x-text="confirmDialog.processing ? 'Processing...' : 'Confirm'">
        </button>
      </div>
    </div>
  </div>

</div>
{% endblock %}

{% block page_scripts %}
<script>
  function staffDirectory() {
    return {
      userRole: '{{ user.role|default("admin") }}',
      loading: true,
      staff: [],
      search: '',
      statusFilter: 'all',
      confirmDialog: { open: false, member: null, name: '', newStatus: '', processing: false },

      get filteredStaff() {
        let list = [...this.staff];
        if (this.statusFilter !== 'all') {
          list = list.filter(s => s.status === this.statusFilter);
        }
        if (this.search.trim()) {
          const q = this.search.toLowerCase();
          list = list.filter(s =>
            (s.full_name || '').toLowerCase().includes(q) ||
            (s.phone_number || '').includes(q) ||
            (s.designation || '').toLowerCase().includes(q)
          );
        }
        return list.sort((a, b) => (a.full_name || '').localeCompare(b.full_name || ''));
      },

      async loadStaff() {
        this.loading = true;
        try {
          const res = await fetch('/api/users/staff', { credentials: 'include' });
          if (res.ok) {
            const data = await res.json();
            this.staff = data.staff || data.data || data.users || [];
          } else {
            dispatchToast('error', 'Error', 'Failed to load staff directory');
          }
        } catch (e) {
          dispatchToast('error', 'Network Error', 'Could not reach the server');
        } finally {
          this.loading = false;
        }
      },

      formatDesignation(designation) {
        if (!designation) return 'Staff';
        return String(designation)
          .split('_')
          .map(w => w.charAt(0).toUpperCase() + w.slice(1))
          .join(' ');
      },

      salarySummary(member) {
        if ((member.salary_type || 'weekly') === 'monthly') {
          const value = Number(member.monthly_salary || 0);
          return value ? `₹${value.toLocaleString('en-IN')} / month` : '-';
        }
        const value = Number(member.weekly_salary || 0);
        return value ? `₹${value.toLocaleString('en-IN')} / week` : '-';
      },

      formatIndianPhone(phone) {
        const digits = String(phone || '').replace(/\D/g, '');
        if (!digits) return '-';
        if (digits.length === 10) return `+91 ${digits}`;
        if (digits.length === 12 && digits.startsWith('91')) return `+91 ${digits.slice(2)}`;
        return `+${digits}`;
      },

      confirmToggle(member) {
        this.confirmDialog = {
          open: true,
          member: member,
          name: member.full_name,
          newStatus: member.status === 'active' ? 'inactive' : 'active',
          processing: false,
        };
      },

      async toggleStatus() {
        const member = this.confirmDialog.member;
        if (!member) return;
        this.confirmDialog.processing = true;

        try {
          const id = member.user_id || member.id;
          const res = await fetch(`/api/users/staff/${id}/status`, {
            method: 'PATCH',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: this.confirmDialog.newStatus }),
          });

          if (res.ok) {
            member.status = this.confirmDialog.newStatus;
            dispatchToast('success', 'Status Updated', `${member.full_name} is now ${this.confirmDialog.newStatus}`);
            this.confirmDialog.open = false;
          } else {
            const err = await res.json().catch(() => ({}));
            dispatchToast('error', 'Error', err.error || 'Failed to update status');
          }
        } catch (e) {
          dispatchToast('error', 'Network Error', 'Could not reach the server');
        } finally {
          this.confirmDialog.processing = false;
        }
      },
    };
  }
</script>
{% endblock %}
