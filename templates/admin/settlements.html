{% extends "admin/layout.html" %}

{% block page_title %}Settlements{% endblock %}

{% block page_content %}
<div x-data="settlementsPage()" x-init="init()" x-cloak>

  <!-- -- Header with Export ------------------------------------------------ -->
  <div class="mb-3 flex items-center justify-between">
    <h1 class="text-sm font-semibold text-gray-800">Settlements</h1>
    <div class="relative" x-data="{ exportOpen: false }">
      <button @click="exportOpen = !exportOpen"
              class="inline-flex items-center gap-1 rounded-lg bg-white px-2.5 py-1.5 text-[11px] font-medium text-gray-600 shadow-sm hover:shadow-md">
        <span x-html="renderIcon('arrow-down-tray', 'h-3.5 w-3.5')"></span>
        Export
      </button>
      <div x-show="exportOpen" @click.outside="exportOpen = false" x-transition
           class="absolute right-0 mt-1 w-40 rounded-lg bg-white py-1 shadow-lg ring-1 ring-gray-100 z-50">
        <a :href="getExportUrl('csv')"
           class="flex items-center gap-2 px-3 py-1.5 text-[11px] text-gray-700 hover:bg-gray-50">
          <span x-html="renderIcon('document-text', 'h-3.5 w-3.5 text-green-600')"></span>
          Export as CSV
        </a>
        <a :href="getExportUrl('pdf')"
           class="flex items-center gap-2 px-3 py-1.5 text-[11px] text-gray-700 hover:bg-gray-50">
          <span x-html="renderIcon('document', 'h-3.5 w-3.5 text-red-600')"></span>
          Export as PDF
        </a>
      </div>
    </div>
  </div>

  <!-- -- Weekly / Monthly Tabs ------------------------------------------- -->
  <div class="mb-3 flex rounded-xl bg-white p-0.5 shadow-sm">
    <button @click="switchTab('weekly')"
            :class="activeTab === 'weekly' ? 'bg-brand-600 text-white shadow-sm' : 'text-gray-500 hover:text-gray-700'"
            class="flex-1 rounded-lg px-3 py-1.5 text-[11px] font-semibold transition-all">
      Weekly
    </button>
    <button @click="switchTab('monthly')"
            :class="activeTab === 'monthly' ? 'bg-brand-600 text-white shadow-sm' : 'text-gray-500 hover:text-gray-700'"
            class="flex-1 rounded-lg px-3 py-1.5 text-[11px] font-semibold transition-all">
      Monthly
    </button>
  </div>

  <!-- -- Filter Bar ------------------------------------------------------ -->
  <div class="mb-3 flex items-center gap-2 rounded-xl bg-white px-2.5 py-1.5 shadow-sm">
    <input type="date" x-model="filterStart"
           class="flex-1 rounded-lg border-0 bg-gray-50 px-2 py-1.5 text-xs text-gray-700 focus:bg-white focus:ring-2 focus:ring-brand-200 focus:outline-none">
    <span class="text-xs text-gray-300">→</span>
    <input type="date" x-model="filterEnd"
           class="flex-1 rounded-lg border-0 bg-gray-50 px-2 py-1.5 text-xs text-gray-700 focus:bg-white focus:ring-2 focus:ring-brand-200 focus:outline-none">
    <select x-model="statusFilter"
            class="rounded-lg border-0 bg-gray-50 px-2 py-1.5 text-xs text-gray-500 focus:outline-none">
      <option value="">All</option>
      <option value="pending">Pending</option>
      <option value="partial">Partial</option>
      <option value="settled">Settled</option>
    </select>
    <button @click="loadSettlements()"
            class="rounded-lg bg-brand-600 p-2 text-white hover:bg-brand-700">
      <span x-html="renderIcon('magnifying-glass', 'h-4 w-4')"></span>
    </button>
  </div>

  <!-- -- Summary Totals Bar ---------------------------------------------- -->
  <div x-show="!loading && filteredSettlements.length > 0" class="mb-3 flex items-center gap-2">
    <div class="flex-1 rounded-xl bg-white p-2.5 text-center shadow-sm">
      <p class="text-[10px] font-medium text-gray-400">Payable</p>
      <p class="text-xs font-bold text-gray-900">&#8377;<span x-text="sumField('net_payable').toLocaleString('en-IN')"></span></p>
    </div>
    <div class="flex-1 rounded-xl bg-white p-2.5 text-center shadow-sm">
      <p class="text-[10px] font-medium text-gray-400">Settled</p>
      <p class="text-xs font-bold text-green-600">&#8377;<span x-text="sumField('amount_settled').toLocaleString('en-IN')"></span></p>
    </div>
    <div class="flex-1 rounded-xl bg-white p-2.5 text-center shadow-sm">
      <p class="text-[10px] font-medium text-gray-400">Pending</p>
      <p class="text-xs font-bold text-amber-600">&#8377;<span x-text="sumField('carry_forward').toLocaleString('en-IN')"></span></p>
    </div>
  </div>

  <!-- -- Loading --------------------------------------------------------- -->
  <div x-show="loading" class="py-12 text-center">
    <svg class="mx-auto h-8 w-8 animate-spin text-brand-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
    </svg>
  </div>

  <!-- -- Empty ----------------------------------------------------------- -->
  <div x-show="!loading && filteredSettlements.length === 0" class="py-10 text-center">
    <div class="mb-1.5 text-gray-300" x-html="renderIcon('inbox', 'h-8 w-8 mx-auto')"></div>
    <p class="text-xs font-medium text-gray-500">No settlements found</p>
    <p class="mt-1 text-[10px] text-gray-400" x-text="activeTab === 'weekly' ? 'Settlements will be auto-generated for the current week' : 'Generate monthly settlements using the period filter'"></p>
  </div>

  <!-- -- Settlement Cards ------------------------------------------------ -->
  <div x-show="!loading && filteredSettlements.length > 0" class="space-y-2">
    <template x-for="s in filteredSettlements" :key="s.id || s.settlement_id">
      <div class="rounded-xl bg-white px-3 py-2.5 shadow-sm">

        <!-- Row 1: Icon + Name + Amount -->
        <div class="flex items-center gap-2.5">
          <div class="flex h-7 w-7 shrink-0 items-center justify-center rounded-lg"
               :class="{
                 'bg-green-50 text-green-600': s.settlement_status === 'settled',
                 'bg-amber-50 text-amber-600': s.settlement_status === 'partial',
                 'bg-brand-50 text-brand-600': !s.settlement_status || s.settlement_status === 'pending'
               }"
               x-html="s.settlement_status === 'settled' ? renderIcon('check-circle', 'h-3.5 w-3.5') : renderIcon('banknotes', 'h-3.5 w-3.5')"></div>
          <div class="flex-1 min-w-0">
            <h3 class="text-xs font-semibold text-gray-800 truncate" x-text="s.staff_name || s.full_name || 'Staff'"></h3>
            <p class="text-[11px] text-gray-400" x-text="formatDateShort(s.week_start) + ' – ' + formatDateShort(s.week_end)"></p>
          </div>
          <div class="text-right shrink-0">
            <p class="text-sm font-bold text-gray-900">&#8377;<span x-text="Number(s.net_payable ?? 0).toLocaleString('en-IN')"></span></p>
          </div>
        </div>

        <!-- Row 2: Breakdown chips -->
        <div class="mt-2 flex flex-wrap gap-1.5">
          <span class="rounded-lg bg-gray-50 px-2 py-1 text-[10px] text-gray-500">Base &#8377;<span class="font-semibold text-gray-700" x-text="Number(s.base_pay ?? 0).toLocaleString('en-IN')"></span></span>
          <template x-if="Number(s.overtime_pay ?? 0) > 0">
            <span class="rounded-lg bg-green-50 px-2 py-1 text-[10px] text-green-600">OT +&#8377;<span class="font-semibold" x-text="Number(s.overtime_pay).toLocaleString('en-IN')"></span></span>
          </template>
          <template x-if="Number(s.expenses ?? 0) > 0">
            <button @click="showExpenseModal(s)" class="rounded-lg bg-amber-50 px-2 py-1 text-[10px] text-amber-600">Exp &#8377;<span class="font-semibold" x-text="Number(s.expenses).toLocaleString('en-IN')"></span></button>
          </template>
          <template x-if="Number(s.advances ?? 0) > 0">
            <span class="rounded-lg bg-red-50 px-2 py-1 text-[10px] text-red-500">Adv -&#8377;<span class="font-semibold" x-text="Number(s.advances).toLocaleString('en-IN')"></span></span>
          </template>
          <span class="rounded-lg bg-blue-50 px-2 py-1 text-[10px] text-blue-600"><span class="font-semibold" x-text="fmtH(s.hours_worked)"></span></span>
          <template x-if="s.carry_forward_in > 0">
            <span class="rounded-lg bg-orange-50 px-2 py-1 text-[10px] text-orange-600">CF +&#8377;<span class="font-semibold" x-text="Number(s.carry_forward_in).toLocaleString('en-IN')"></span></span>
          </template>
        </div>

        <!-- Row 3: Status + Settle button -->
        <div class="mt-2.5 flex items-center justify-between">
          <template x-if="s.settlement_status === 'settled'">
            <span class="inline-flex items-center gap-1 text-xs font-medium text-green-600">
              <span x-html="renderIcon('check-circle', 'h-4 w-4')"></span> Paid &#8377;<span x-text="Number(s.amount_settled ?? 0).toLocaleString('en-IN')"></span>
            </span>
          </template>
          <template x-if="s.settlement_status === 'partial'">
            <span class="text-xs font-medium text-amber-600">&#8377;<span x-text="Number(s.carry_forward ?? 0).toLocaleString('en-IN')"></span> remaining</span>
          </template>
          <template x-if="!s.settlement_status || s.settlement_status === 'pending'">
            <span class="text-xs text-gray-300">Not settled</span>
          </template>
          <button @click="openSettleModal(s)"
                  class="rounded-lg px-3 py-1.5 text-[11px] font-semibold transition-all"
                  :class="s.settlement_status === 'settled' ? 'bg-gray-50 text-gray-400 hover:bg-gray-100' : 'bg-brand-600 text-white hover:bg-brand-700 shadow-sm'">
            <span x-text="s.settlement_status === 'settled' ? 'Update' : 'Settle'"></span>
          </button>
        </div>
      </div>
    </template>
  </div>

  <!-- -- Expense Modal --------------------------------------------------- -->
  <div x-show="expenseModalOpen" class="fixed inset-0 z-50 flex items-end justify-center sm:items-center p-0 sm:p-4" style="background: rgba(0,0,0,0.3)">
    <div class="bg-white rounded-t-3xl sm:rounded-3xl shadow-xl w-full max-w-md relative overflow-y-auto max-h-[85vh] p-5">
      <div class="mx-auto mb-3 h-1 w-10 rounded-full bg-gray-200 sm:hidden"></div>
      <button @click="expenseModalOpen = false" class="absolute top-4 right-4 rounded-full p-1.5 text-gray-400 hover:bg-gray-100">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
      </button>
      <h3 class="text-sm font-bold text-gray-900 mb-1">Expenses</h3>
      <p class="text-xs text-gray-400 mb-3"><span x-text="expenseModalStaff"></span> · <span x-text="expenseModalPeriod"></span></p>
      <div>
        <template x-if="expenseModalRecords.length === 0">
          <div class="py-6 text-center text-gray-400 text-xs">No expense records found</div>
        </template>
        <div class="space-y-2">
          <template x-for="e in expenseModalRecords" :key="e.request_id">
            <div class="flex items-center justify-between rounded-xl bg-gray-50 px-3 py-2.5">
              <div>
                <span class="text-xs font-medium text-gray-700" x-text="e.category"></span>
                <p class="text-[10px] text-gray-400 mt-0.5" x-text="e.description || e.notes || '-'"></p>
              </div>
              <div class="text-right">
                <span class="text-sm font-bold text-gray-900">&#8377;<span x-text="Number(e.amount).toLocaleString('en-IN')"></span></span>
                <template x-if="e.receipt_url">
                  <a :href="e.receipt_url" target="_blank" class="block text-[10px] text-brand-600 mt-0.5">Receipt</a>
                </template>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>
  </div>

  <!-- -- Mark Settled Modal (bottom sheet on mobile) --------------------- -->
  <div x-show="settleModalOpen" class="fixed inset-0 z-50 flex items-end justify-center sm:items-center p-0 sm:p-4" style="background: rgba(0,0,0,0.3)"
       @keydown.escape.window="settleModalOpen = false">
    <div class="bg-white rounded-t-3xl sm:rounded-3xl shadow-xl w-full max-w-sm relative overflow-hidden"
         @click.outside="settleModalOpen = false">
      <div class="mx-auto mt-2 mb-1 h-1 w-10 rounded-full bg-gray-200 sm:hidden"></div>
      <div class="px-5 py-3 flex items-center justify-between">
        <div>
          <h3 class="text-sm font-bold text-gray-900" x-text="settleStaffName"></h3>
          <p class="text-xs text-gray-400">Net &#8377;<span class="font-bold text-gray-700" x-text="Number(settleNetPayable).toLocaleString('en-IN')"></span></p>
        </div>
        <button @click="settleModalOpen = false" class="rounded-full p-1.5 text-gray-400 hover:bg-gray-100">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="px-5 pb-6 space-y-3">
        <div class="flex gap-1.5">
          <button @click="settleAmount = settleNetPayable"
                  class="flex-1 rounded-lg bg-green-50 py-2 text-[11px] font-semibold text-green-700 hover:bg-green-100">Full</button>
          <button @click="settleAmount = Math.round(settleNetPayable / 2)"
                  class="flex-1 rounded-lg bg-amber-50 py-2 text-[11px] font-semibold text-amber-700 hover:bg-amber-100">Half</button>
          <button @click="settleAmount = 0"
                  class="flex-1 rounded-lg bg-gray-50 py-2 text-[11px] font-semibold text-gray-600 hover:bg-gray-100">Custom</button>
        </div>
        <div>
          <label class="block text-[11px] font-medium text-gray-500 mb-1">Amount (&#8377;)</label>
          <input type="number" x-model.number="settleAmount" min="0" :max="settleNetPayable" step="1"
                 class="w-full rounded-lg border-0 bg-gray-50 px-3 py-2.5 text-sm font-bold text-gray-900 focus:bg-white focus:ring-2 focus:ring-brand-200 focus:outline-none">
        </div>
        <template x-if="settleAmount < settleNetPayable && settleAmount >= 0">
          <div class="rounded-lg bg-amber-50 px-2.5 py-1.5 text-center">
            <p class="text-[11px] text-amber-600">&#8377;<span class="font-bold" x-text="Math.max(0, settleNetPayable - settleAmount).toLocaleString('en-IN')"></span> carries forward</p>
          </div>
        </template>
        <button @click="confirmSettle()" :disabled="settleSubmitting"
                class="w-full rounded-lg bg-brand-600 py-2.5 text-xs font-bold text-white hover:bg-brand-700 disabled:opacity-50 shadow-sm">
          <span x-show="!settleSubmitting">Confirm Settlement</span>
          <span x-show="settleSubmitting">Saving...</span>
        </button>
      </div>
    </div>
  </div>

</div>
{% endblock %}

{% block page_scripts %}
<script>
  function formatHours(hours) {
    if (typeof hours !== 'number' || isNaN(hours) || hours <= 0) return '-';
    const totalMinutes = Math.round(hours * 60);
    const hr = Math.floor(totalMinutes / 60);
    const min = totalMinutes % 60;
    let out = '';
    if (hr > 0) out += hr + ' hr';
    if (min > 0) out += (out ? ' ' : '') + min + ' min';
    return out || '0 min';
  }

  /* compact hours: 48h30m */
  function fmtH(hours) {
    if (typeof hours !== 'number' || isNaN(hours) || hours <= 0) return '-';
    const m = Math.round(hours * 60);
    const h = Math.floor(m / 60);
    const r = m % 60;
    return h + 'h' + (r > 0 ? r + 'm' : '');
  }

  function settlementsPage() {
    return {
      loading: true,
      settlements: [],
      activeTab: 'weekly',
      filterStart: '',
      filterEnd: '',
      statusFilter: '',
      expenseModalOpen: false,
      expenseModalStaff: '',
      expenseModalPeriod: '',
      expenseModalRecords: [],
      settleModalOpen: false,
      settleSubmitting: false,
      settleSettlementId: '',
      settleStaffName: '',
      settleNetPayable: 0,
      settleAmount: 0,

      get filteredSettlements() {
        if (!this.statusFilter) return this.settlements;
        return this.settlements.filter(s => (s.settlement_status || 'pending') === this.statusFilter);
      },

      init() {
        this.setDefaultDates();
        this.loadSettlements();
      },

      setDefaultDates() {
        const today = new Date();
        if (this.activeTab === 'weekly') {
          const day = today.getDay();
          const monday = new Date(today);
          monday.setDate(today.getDate() - ((day === 0 ? 7 : day) - 1));
          const sunday = new Date(monday);
          sunday.setDate(monday.getDate() + 6);
          this.filterStart = monday.toISOString().slice(0, 10);
          this.filterEnd = sunday.toISOString().slice(0, 10);
        } else {
          const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
          const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0);
          this.filterStart = firstDay.toISOString().slice(0, 10);
          this.filterEnd = lastDay.toISOString().slice(0, 10);
        }
      },

      switchTab(tab) {
        if (this.activeTab === tab) return;
        this.activeTab = tab;
        this.statusFilter = '';
        this.setDefaultDates();
        this.loadSettlements();
      },

      async loadSettlements() {
        this.loading = true;
        try {
          let url = '/api/settlements';
          const params = new URLSearchParams();
          if (this.filterStart) params.set('week_start', this.filterStart);
          if (this.filterEnd) params.set('week_end', this.filterEnd);
          if (params.toString()) url += '?' + params.toString();
          const res = await fetch(url, { credentials: 'include' });
          if (res.ok) {
            const data = await res.json();
            let all = data.settlements || data.data || [];
            this.settlements = all.filter(s => {
              const cycle = s.settlement_cycle || s.salary_type || 'weekly';
              return cycle === this.activeTab;
            });
            if (this.settlements.length === 0 && this.filterStart && this.filterEnd) {
              await this.autoGenerate();
            }
          } else {
            dispatchToast('error', 'Error', 'Failed to load settlements');
          }
        } catch (e) {
          dispatchToast('error', 'Network Error', 'Could not reach the server');
        } finally {
          this.loading = false;
        }
      },

      async autoGenerate() {
        try {
          const endpoint = this.activeTab === 'monthly'
            ? '/api/settlements/generate-monthly'
            : '/api/settlements/generate';
          const bodyKey = this.activeTab === 'monthly'
            ? { month_start: this.filterStart, month_end: this.filterEnd }
            : { week_start: this.filterStart, week_end: this.filterEnd };
          const res = await fetch(endpoint, {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(bodyKey),
          });
          if (res.ok) {
            const data = await res.json();
            this.settlements = data.settlements || [];
            if (this.settlements.length > 0) {
              dispatchToast('success', 'Auto-Generated', this.settlements.length + ' settlements created.');
            }
          }
        } catch (e) { /* silent */ }
      },

      sumField(field) {
        return this.filteredSettlements.reduce((sum, s) => sum + Number(s[field] ?? 0), 0);
      },

      formatDate(dateStr) {
        if (!dateStr) return '-';
        try {
          return new Date(dateStr).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        } catch (e) { return dateStr; }
      },

      formatDateShort(dateStr) {
        if (!dateStr) return '-';
        try {
          return new Date(dateStr).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
        } catch (e) { return dateStr; }
      },

      getExportUrl(format) {
        const params = new URLSearchParams();
        if (this.filterStart) params.set('week_start', this.filterStart);
        if (this.filterEnd) params.set('week_end', this.filterEnd);
        const queryString = params.toString();
        return '/api/settlements/export/' + format + (queryString ? '?' + queryString : '');
      },

      async showExpenseModal(settlement) {
        this.expenseModalOpen = true;
        this.expenseModalStaff = settlement.staff_name || settlement.full_name || '-';
        this.expenseModalPeriod = this.formatDateShort(settlement.week_start) + ' - ' + this.formatDateShort(settlement.week_end);
        try {
          const res = await fetch('/api/settlements/' + settlement.settlement_id);
          if (res.ok) {
            const data = await res.json();
            this.expenseModalRecords = (data.settlement && data.settlement.expense_records) ? data.settlement.expense_records : [];
          } else { this.expenseModalRecords = []; }
        } catch (e) { this.expenseModalRecords = []; }
      },

      openSettleModal(settlement) {
        this.settleModalOpen = true;
        this.settleSettlementId = settlement.settlement_id;
        this.settleStaffName = settlement.staff_name || settlement.full_name || '-';
        this.settleNetPayable = Number(settlement.net_payable ?? 0);
        const alreadySettled = Number(settlement.amount_settled ?? 0);
        this.settleAmount = this.settleNetPayable - alreadySettled;
      },

      async confirmSettle() {
        if (this.settleSubmitting) return;
        this.settleSubmitting = true;
        try {
          const current = this.settlements.find(s => s.settlement_id === this.settleSettlementId);
          const previouslySettled = current ? Number(current.amount_settled ?? 0) : 0;
          const totalSettled = previouslySettled + this.settleAmount;
          const res = await fetch('/api/settlements/' + this.settleSettlementId + '/settle', {
            method: 'PUT',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount_settled: totalSettled }),
          });
          if (res.ok) {
            const data = await res.json();
            const idx = this.settlements.findIndex(s => s.settlement_id === this.settleSettlementId);
            if (idx !== -1 && data.settlement) {
              this.settlements[idx] = Object.assign({}, this.settlements[idx], data.settlement);
            }
            this.settleModalOpen = false;
            const status = data.settlement && data.settlement.settlement_status;
            if (status === 'settled') {
              dispatchToast('success', 'Settled', 'Settlement marked as fully paid');
            } else {
              dispatchToast('success', 'Partial', 'Partial settlement recorded. Remainder will carry forward.');
            }
          } else {
            const err = await res.json().catch(function(){ return {}; });
            dispatchToast('error', 'Error', err.error || 'Failed to mark settlement');
          }
        } catch (e) {
          dispatchToast('error', 'Network Error', 'Could not reach the server');
        } finally {
          this.settleSubmitting = false;
        }
      },
    };
  }
</script>
{% endblock %}
