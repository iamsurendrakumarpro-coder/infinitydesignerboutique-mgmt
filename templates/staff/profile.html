{% extends "staff/layout.html" %}

{% block page_title %}Profile{% endblock %}

{% block page_content %}
<div x-data="staffProfile()" x-init="init()" x-cloak>

  <!-- -- Profile Header ------------------------------------------------- -->
  <div class="mb-3 flex flex-col items-center text-center animate-fade-in">
    <!-- Avatar -->
    <div class="flex h-12 w-12 items-center justify-center rounded-full bg-brand-100 text-lg font-bold text-brand-600">
         {{ user.full_name|default("S")|first|upper }}</div>
    <h1 class="mt-2 text-sm font-bold text-gray-900" x-text="profile.full_name || '{{ user.full_name|default("Staff") }}'"></h1>
    <p class="mt-0.5 text-xs text-gray-400" x-text="formatPhone(profile.phone_number || '{{ user.phone_number|default("") }}')"></p>
    <div class="mt-1 inline-flex items-center gap-1 rounded-full bg-brand-50 px-2 py-0.5 border border-brand-200">
      <span class="h-1.5 w-1.5 rounded-full bg-green-400"></span>
      <span class="text-xs font-semibold text-brand-700" x-text="formatRole(profile.role || '{{ user.role|default("staff") }}')"></span>
    </div>
  </div>

  <!-- -- Quick Info Cards ----------------------------------------------- -->
    <div class="mb-3 grid grid-cols-2 gap-2">
    <div class="rounded-lg bg-white p-3 text-center border border-gray-200">
      <p class="text-xs font-medium text-gray-500">Joined</p>
      <p class="mt-0.5 text-xs font-bold text-gray-800" x-text="profile.joining_date || '-'"></p>
    </div>
    <div class="rounded-lg bg-white p-3 text-center border border-gray-200">
      <p class="text-xs font-medium text-gray-500" x-text="profile.salary_type === 'monthly' ? 'Monthly Salary' : 'Weekly Salary'"></p>
      <template x-if="profile.salary_type === 'monthly'">
        <p class="mt-0.5 text-xs font-bold text-gray-800" x-text="profile.monthly_salary ? 'Rs ' + Number(profile.monthly_salary).toLocaleString('en-IN') : '-'"></p>
      </template>
      <template x-if="profile.salary_type !== 'monthly'">
        <p class="mt-0.5 text-xs font-bold text-gray-800" x-text="profile.weekly_salary ? 'Rs ' + Number(profile.weekly_salary).toLocaleString('en-IN') : '-'"></p>
      </template>
    </div>
  </div>

  <!-- -- Recent Attendance (Last 7 Days) -------------------------------- -->
  <div class="mb-4 rounded-lg bg-white border border-gray-200">
    <div class="flex items-center justify-between border-b border-gray-100 px-4 py-3">
      <div class="flex items-center gap-2">
        <div class="flex h-6 w-6 shrink-0 items-center justify-center rounded-lg bg-blue-50 text-blue-600" x-html="renderIcon('chart-bar', 'h-3.5 w-3.5')"></div>
        <h2 class="text-xs font-semibold text-gray-900">Last 7 Days</h2>
      </div>
      <span class="rounded-full bg-gray-100 px-2 py-0.5 text-xs font-medium text-gray-500"
            x-text="attendanceDays.length + ' days'"></span>
    </div>

    <!-- Loading -->
    <div x-show="attendanceLoading" class="py-8 text-center">
      <svg class="mx-auto h-6 w-6 animate-spin text-brand-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
    </div>

    <!-- Empty -->
    <div x-show="!attendanceLoading && attendanceDays.length === 0" class="py-6 text-center">
      <p class="text-xs text-gray-400">No attendance records found</p>
    </div>

    <!-- Days List -->
    <div x-show="!attendanceLoading && attendanceDays.length > 0" class="divide-y divide-gray-50">
      <template x-for="day in attendanceDays" :key="day.date">
        <div class="flex items-center justify-between px-4 py-2.5">
          <div class="flex items-center gap-2.5">
            <div class="flex h-7 w-7 items-center justify-center rounded-lg text-xs"
                 :class="{
                   'bg-green-50 text-green-600': day.status === 'present' || day.status === 'completed' || day.status === 'in',
                   'bg-red-50 text-red-500': day.status === 'absent',
                   'bg-gray-50 text-gray-400': !day.status || day.status === 'unknown',
                 }"
                 x-text="day.status === 'present' || day.status === 'completed' || day.status === 'in' ? 'P' : day.status === 'absent' ? 'A' : '-'"></div>
            <div>
              <p class="text-xs font-medium text-gray-800" x-text="formatDayDate(day.date)"></p>
              <p class="text-xs text-gray-400" x-text="(day.punch_in || day.login_time || '-') + ' to ' + (day.punch_out || day.logout_time || '-')"></p>
            </div>
          </div>
          <span class="text-xs font-semibold text-gray-500" x-text="day.duration || day.total_hours || '-'"></span>
        </div>
      </template>
    </div>
  </div>

  <!-- -- Change PIN ----------------------------------------------------- -->
  <div class="mb-4 rounded-lg bg-white border border-gray-200">
    <button @click="pinOpen = !pinOpen"
            class="flex w-full items-center justify-between px-4 py-3">
      <div class="flex items-center gap-2.5">
        <span class="text-lg">🔒</span>
        <span class="text-xs font-semibold text-gray-900">Change PIN</span>
      </div>
      <svg class="h-4 w-4 text-gray-400 transition-transform" :class="pinOpen && 'rotate-180'"
           fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
      </svg>
    </button>

    <div x-show="pinOpen" x-transition class="border-t border-gray-100 px-4 py-3">
      <div class="space-y-2.5">
        <!-- Current PIN -->
        <div>
          <label class="mb-1 block text-xs font-medium text-gray-500">Current PIN</label>
          <input type="password"
                 x-model="pin.current"
                 inputmode="numeric"
                 maxlength="6"
                 placeholder="****"
                 class="w-full rounded-lg border border-gray-200 bg-gray-50 px-3 py-2 text-center text-sm font-bold tracking-[0.5em] text-gray-800 transition-colors focus:border-brand-400 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-100">
        </div>
        <!-- New PIN -->
        <div>
          <label class="mb-1 block text-xs font-medium text-gray-500">New PIN</label>
          <input type="password"
                 x-model="pin.new_pin"
                 inputmode="numeric"
                 maxlength="6"
                 placeholder="****"
                 class="w-full rounded-lg border border-gray-200 bg-gray-50 px-3 py-2 text-center text-sm font-bold tracking-[0.5em] text-gray-800 transition-colors focus:border-brand-400 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-100">
        </div>
        <!-- Confirm PIN -->
        <div>
          <label class="mb-1 block text-xs font-medium text-gray-500">Confirm New PIN</label>
          <input type="password"
                 x-model="pin.confirm"
                 inputmode="numeric"
                 maxlength="6"
                 placeholder="****"
                 class="w-full rounded-lg border border-gray-200 bg-gray-50 px-3 py-2 text-center text-sm font-bold tracking-[0.5em] text-gray-800 transition-colors focus:border-brand-400 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-100"
                 @keydown.enter="changePin()">
        </div>
        <!-- Submit -->
        <button @click="changePin()"
                :disabled="pinChanging || !pin.current || !pin.new_pin || !pin.confirm"
                class="w-full rounded-lg bg-brand-600 py-2.5 text-xs font-bold text-white shadow-sm transition-all hover:bg-brand-700 active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed">
          <span x-show="!pinChanging">Update PIN</span>
          <span x-show="pinChanging" class="inline-flex items-center gap-2">
            <svg class="h-4 w-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Updating...
          </span>
        </button>
      </div>
    </div>
  </div>

  <div class="mt-4 pb-4 text-center">
    <p class="text-xs text-gray-400">{{ boutique_name }} - Staff Portal</p>
  </div>

</div>
{% endblock %}

{% block page_scripts %}
<script>
  function staffProfile() {
    return {
      profile: {
        full_name: '{{ user.full_name|default("") }}',
        phone_number: '{{ user.phone_number|default("") }}',
        role: '{{ user.role|default("staff") }}',
        joining_date: null,
        salary_type: 'weekly',
        weekly_salary: null,
        monthly_salary: null,
        daily_salary: null,
        skills: [],
      },
      pinOpen: false,
      pin: { current: '', new_pin: '', confirm: '' },
      pinChanging: false,
      attendanceDays: [],
      attendanceLoading: false,

      async init() {
        await Promise.all([
          this.fetchProfile(),
          this.fetchAttendance(),
        ]);
      },

      formatRole(role) {
        const map = {
          staff: 'Staff',
          tailor: 'Tailor',
          admin: 'Admin',
          root_admin: 'Root Admin',
          manager: 'Manager',
        };
        return map[role] || role || 'Staff';
      },

      formatPhone(phone) {
        const digits = String(phone || '').replace(/\D/g, '');
        if (!digits) return '';
        // If 10 digits, assume Indian number and prefix +91
        if (digits.length === 10) return `+91 ${digits}`;
        // If starts with 91 and length 12, format as +91 XXXXXXXXXX
        if (digits.length === 12 && digits.startsWith('91')) return `+91 ${digits.slice(2)}`;
        // Otherwise, prefix with + and raw digits
        return `+${digits}`;
      },

      async fetchProfile() {
        try {
          // Step 1: Get logged-in user ID
          const authRes = await fetch('/api/auth/me', { credentials: 'include' });
          let userId = null;
          if (authRes.ok) {
            const authData = await authRes.json();
            userId = authData.user ? authData.user.user_id : authData.user_id;
          }
          if (!userId) throw new Error('Could not determine user ID');

          // Step 2: Fetch staff profile from correct endpoint
          const res = await fetch(`/api/users/staff/${userId}`, { credentials: 'include' });
          if (res.ok) {
            const data = await res.json();
            const u = data.staff || data.user || data;
            // Always map all fields, fallback to default if missing
            this.profile.full_name = u.full_name || this.profile.full_name || 'Staff';
            this.profile.phone_number = u.phone_number || this.profile.phone_number || '';
            this.profile.role = u.role || u.designation || this.profile.role || 'staff';
            this.profile.joining_date = u.joining_date || u.joined || u.created_at || '-';
            this.profile.salary_type = u.salary_type || 'weekly';
            this.profile.weekly_salary = typeof u.weekly_salary !== 'undefined' ? u.weekly_salary : null;
            this.profile.monthly_salary = typeof u.monthly_salary !== 'undefined' ? u.monthly_salary : null;

            // Compute daily salary based on salary type
            const WORKING_DAYS_PER_WEEK = 6;
            const MONTHLY_WORKING_DAYS = 26;
            if (this.profile.salary_type === 'monthly' && this.profile.monthly_salary) {
              this.profile.daily_salary = Math.round(this.profile.monthly_salary / MONTHLY_WORKING_DAYS);
            } else if (this.profile.weekly_salary) {
              this.profile.daily_salary = Math.round(this.profile.weekly_salary / WORKING_DAYS_PER_WEEK);
            } else {
              this.profile.daily_salary = typeof u.daily_salary !== 'undefined' ? u.daily_salary : null;
            }

            this.profile.skills = Array.isArray(u.skills) ? u.skills : (Array.isArray(u.specializations) ? u.specializations : []);

            // Defensive: ensure all fields are set
            if (!this.profile.joining_date) this.profile.joining_date = '-';
            if (!this.profile.skills) this.profile.skills = [];

            if (this.profile.joining_date && this.profile.joining_date !== '-') {
              try {
                const d = new Date(this.profile.joining_date);
                if (!isNaN(d.getTime())) {
                  this.profile.joining_date = d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', timeZone: 'Asia/Kolkata' });
                }
              } catch {}
            }
          }
        } catch (e) {
          console.error('Profile fetch error:', e);
        }
      },

      async fetchAttendance() {
        this.attendanceLoading = true;
        try {
          const res = await fetch('/api/attendance/history?period=weekly', { credentials: 'include' });
          if (res.ok) {
            const data = await res.json();
            this.attendanceDays = data.records || data.history || data.data || [];
          }
        } catch (e) {
          console.error('Attendance fetch error:', e);
        } finally {
          this.attendanceLoading = false;
        }
      },

      async changePin() {
        if (!this.pin.current || !this.pin.new_pin || !this.pin.confirm) {
          dispatchToast('error', 'Missing Fields', 'Please fill in all PIN fields');
          return;
        }
        if (this.pin.new_pin !== this.pin.confirm) {
          dispatchToast('error', 'PIN Mismatch', 'New PIN and confirmation do not match');
          return;
        }
        if (this.pin.new_pin.length < 4) {
          dispatchToast('error', 'Too Short', 'PIN must be at least 4 digits');
          return;
        }
        if (this.pinChanging) return;
        this.pinChanging = true;

        try {
          const res = await fetch('/api/auth/change-pin', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              current_pin: this.pin.current,
              new_pin: this.pin.new_pin,
            }),
          });

          const data = await res.json();

          if (!res.ok) {
            dispatchToast('error', 'PIN Change Failed', data.error || data.message || 'Could not update PIN');
            return;
          }

          dispatchToast('success', 'PIN Updated', 'Your PIN has been changed successfully');
          this.pin = { current: '', new_pin: '', confirm: '' };
          this.pinOpen = false;
        } catch (e) {
          dispatchToast('error', 'Network Error', 'Please check your connection');
        } finally {
          this.pinChanging = false;
        }
      },

      formatDayDate(dateStr) {
        if (!dateStr) return '-';
        try {
          const d = new Date(dateStr);
          if (isNaN(d.getTime())) return dateStr;
          return d.toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short', timeZone: 'Asia/Kolkata' });
        } catch {
          return dateStr;
        }
      },
    };
  }
</script>
{% endblock %}
